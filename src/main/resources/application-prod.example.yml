# 生产环境配置（服务器使用，不要提交到 Git）
# 参考此文件创建 application-prod.yml，并填入真实值
# 需与本地 application-prod.yml 的字段结构保持完全对应（敏感信息用占位符替代）

spring:
  datasource:
    url: jdbc:mysql://REPLACE_ME:3306/kscn-top?useSSL=false  # 生产数据库 IP
    username: REPLACE_ME  # 数据库用户名
    password: REPLACE_ME  # 数据库密码
  mail:
    host: smtp.qq.com
    port: 465
    username: REPLACE_ME  # 发件人邮箱
    password: REPLACE_ME  # 邮箱授权码（非登录密码，需在邮箱设置中开启SMTP并获取）
    properties:
      mail.smtp.ssl.enable: true
  data:
    redis:
      host: localhost
      port: 6379
      password:  # 生产 Redis 如有密码请填写
      database: 0

aliyun:
  captcha:
    access-key-id: REPLACE_ME  # 阿里云 AccessKey ID
    access-key-secret: REPLACE_ME  # 阿里云 AccessKey Secret

file:
  storage-root: REPLACE_ME  # 服务器文件存储根目录，如 /kscn-storage

jwt:
  secret: REPLACE_ME  # JWT 签名密钥，生产环境请使用高强度随机字符串，长度建议不低于32位

cookie:
  name: jwt_token  # Cookie 名称，前后端需保持一致
  secure: true  # 生产环境必须使用 HTTPS，否则改为 false
