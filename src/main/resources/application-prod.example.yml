spring:
  datasource:
    url: jdbc:mysql://115.190.39.59:3306/kscn-top?useSSL=false # 数据库连接地址
    username: REPLACE_ME # 数据库用户名
    password: REPLACE_ME # 数据库密码
  mail:
    host: smtp.qq.com # 邮件服务器地址
    port: 465 # 邮件服务器端口
    username: REPLACE_ME # 发件人邮箱
    password: REPLACE_ME # 发件人邮箱授权码
    properties:
      mail:
        smtp:
          ssl:
            enable: true # 开启SSL
  data:
    redis:
      host: localhost # Redis服务器地址
      port: 6379 # Redis服务器端口
      password:
      database: 0 # Redis数据库索引

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml # MyBatis映射文件位置
  configuration:
    map-underscore-to-camel-case: true # 开启下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL日志打印

aliyun:
  captcha:
    access-key-id: REPLACE_ME # 阿里云AccessKey ID
    access-key-secret: REPLACE_ME # 阿里云AccessKey Secret

file:
  storage-root: /kscn-storage  # 云盘统一存储根目录（包含avatar/、storage/、temp/）
